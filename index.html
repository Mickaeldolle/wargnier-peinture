<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Vite App</title>
</head>
<body>
    <div id="app">
      <header class="px-5 py-2 items-end flex justify-evenly">
        <img src="/public/wargnierlogo.png" width="180">
        <nav class="flex justify-end">
          <ul class=" flex justify-between text-2xl space-x-36">
            <li class="hover:border-b hover:text-[#FF9000] border-[#FF9000] hover:scale-105 ease-out duration-300 kanit-bold "><a href="#">Accueil</a></li>
            <li class="hover:border-b hover:text-[#FE0000] border-[#FE0000] hover:scale-105 ease-out duration-300 kanit-bold "><a href="#">Services</a></li>
            <li class="hover:border-b hover:text-[#007DFE] border-[#007DFE] hover:scale-105 ease-out duration-300 kanit-bold "><a href="#">Réalisations</a></li>
            <li class="hover:border-b hover:text-[#E020FF] border-[#E020FF] hover:scale-105 ease-out duration-300 kanit-bold "><a href="#">Contact</a></li>
          </ul>
        </nav>
      </header>
      <section class="h-screen bg-gray-100 flex overflow-hidden relative rounded-t-[80px] mx-10 border">
        <div class="z-10 w-2/5 absolute bottom-0">
          <img src="/public/peinture.svg" alt="">
        </div>
        <div class="z-50 p-0 m-10 w-3/5">
          <h1 class="kanit-regular custom-letter-spacing leading-[120px] text-[9rem] uppercase font-bold">Sarl <span class="kanit-bold">Wargnier Peinture</span></h1>
          <p class="text-xl font-medium mb-8 text-end kanit-light ">Votre artisan peintre dans la Marne.</p>
          <div class="flex justify-center">
            <a class="kanit-semibold inline-block ml-auto transform bg-white/30 backdrop-blur-sm shadow-inner border border-white/50 shadow-white px-12 py-3 rounded-full font-medium text-3xl hover:scale-110 ease-out duration-300" href="tel:0123456789">
              06 09 08 74 85
            </a>
          </div>
        </div>
        <div class="shadow-2xl transform rotate-12 absolute w-2/3 right-12 top-1/2 -translate-y-1/2">
          <img class="" src="/public/peintre2.jpg" alt="">
        </div>
      </section>
      <section class="hero h-screen relative p-10">
        <div class="h-[80%] w-[70%] rounded-xl bg-white/30 backdrop-blur-md border border-white/50 p-5 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 shadow-2xl">
          <h2 class="kanit-semibold text-center text-3xl">Une expertise de plus de 15 ans à votre service</h2>
        </div>
        <div class="h-full grid grid-cols-hero gap-5 grid-rows-hero">
          <div class="hero bg-hero-bg1 bg-cover bg-center col-span-1 row-span-4">
            <!-- Contenu ici si nécessaire -->
          </div>
          <div class="hero bg-hero-bg2 bg-cover bg-bottom shadow-lg row-span-2">
            <!-- Contenu ici si nécessaire -->
          </div>
          <div class="hero bg-hero-bg3 bg-bottom bg-cover shadow-lg row-span-2">
            <!-- Contenu ici si nécessaire -->
          </div>
        </div>
      </section>
      
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
